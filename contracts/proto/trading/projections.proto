syntax = "proto3";

package trading.v1;

import "trading/common.proto";

message OverviewSnapshot {
  string account_id = 1;
  AccountMode mode = 2;
  string broker = 3;
  bool broker_connected = 4;
  double cash = 5;
  double buying_power = 6;
  double day_pnl = 7;
  double realized_pnl = 8;
  double unrealized_pnl = 9;
  double exposure_pct = 10;
  double margin_usage_pct = 11;
  bool short_permission = 12;
  uint64 short_intents_blocked_today = 13;
  string risk_state = 14;
  AccountRuntimeControls runtime_controls = 15;
  Money cash_value = 16;
  Money buying_power_value = 17;
  Money day_pnl_value = 18;
  Money realized_pnl_value = 19;
  Money unrealized_pnl_value = 20;
  string account_currency = 21;
  Money net_liquidation = 22;
  Money equity_with_loan = 23;
  Money initial_margin = 24;
  Money maintenance_margin = 25;
  Money excess_liquidity = 26;
  Money available_funds = 27;
  Money sma = 28;
  optional int32 day_trades_remaining = 29;
  string pdt_status = 30;
  string trading_restriction = 31;
  Money settled_cash = 32;
  Money unsettled_cash = 33;
  Money gross_exposure = 34;
  Money net_exposure = 35;
  Money long_market_value = 36;
  Money short_market_value = 37;
  // OCaml account authority mirror:
  // trading_types_ext.account_table/account_topology own canonical id,
  // account_slot, hash, endpoint, client_id, role_bits, readonly, gateway_tier.
  string canonical_account_id = 38;
  optional uint32 account_slot = 39;
  string account_id_hash_hex = 40;
  string endpoint_id = 41;
  optional int32 client_id = 42;
  string gateway_tier = 43;
  string account_role = 44;
  optional uint32 role_bits = 45;
  optional bool readonly = 46;
  optional bool margin_account = 47;
  string account_type = 48;
  // Cockpit materialized valuation metadata. These are projection-state truth
  // fields derived from account snapshots and position marks; they are not
  // OCaml account-authority inputs.
  string account_snapshot_id = 49;
  optional uint64 account_snapshot_seq = 50;
  string account_snapshot_source = 51;
  optional int64 account_snapshot_ts_ns = 52;
  optional uint64 account_snapshot_age_ms = 53;
  string valuation_status = 54;
  bool valuation_stale = 55;
  string valuation_incomplete_reason = 56;
  string cash_source = 57;
  string buying_power_source = 58;
  string net_liq_source = 59;
  string available_funds_source = 60;
  string day_pnl_source = 61;
  string realized_source = 62;
  string unrealized_source = 63;
  string effective_trade_state = 64;
  string effective_trade_reason = 65;
  bool can_submit_order = 66;
  bool can_cancel_order = 67;
  bool can_modify_order = 68;
  bool can_liquidate = 69;
  bool can_short = 70;
  bool can_open_long = 71;
  bool can_close_position = 72;
  bool valuation_ok = 73;
}

message AccountRuntimeControls {
  bool entry_disabled = 1;
  bool reduce_only = 2;
  bool flatten_only = 3;
  bool cancel_all = 4;
}

message StrategySnapshot {
  string strategy_id = 1;
  StrategyState state = 2;
  AccountMode mode = 3;
  uint64 universe_count = 4;
  uint64 signals = 5;
  uint64 intents = 6;
  uint64 orders = 7;
  double pnl = 8;
  uint64 heartbeat_lag_ms = 9;
  map<string, string> parameters = 10;
  repeated StrategyRiskGate risk_gates = 11;
  optional uint64 last_signal_sequence = 12;
  optional uint64 last_intent_sequence = 13;
  optional uint64 last_order_sequence = 14;
  bool enabled = 15;
  string trading_window = 16;
  string current_phase = 17;
  string universe_version = 18;
  uint64 active_symbol_count = 19;
  uint64 watched_symbol_count = 20;
  uint64 l2_allocated_symbol_count = 21;
  double signal_rate_1m = 22;
  double reject_rate_1m = 23;
  double fill_rate_1m = 24;
  double cancel_rate_1m = 25;
  optional uint64 avg_intent_to_submit_ms = 26;
  optional uint64 avg_submit_to_ack_ms = 27;
  optional uint64 avg_ack_to_fill_ms = 28;
  uint64 consecutive_stops = 29;
  uint64 trades_today = 30;
  uint64 max_trades_today = 31;
  double daily_loss_used_pct = 32;
  uint64 signals_total_today = 33;
  uint64 signals_last_1m = 34;
  uint64 intents_total_today = 35;
  uint64 orders_total_today = 36;
  uint64 fills_total_today = 37;
  uint64 partial_fills_today = 38;
  uint64 cancels_total_today = 39;
  uint64 rejects_total_today = 40;
  Money strategy_realized_pnl = 41;
  Money strategy_unrealized_pnl = 42;
  Money strategy_total_pnl = 43;
  string pnl_source = 44;
  string pnl_basis = 45;
  Money pnl_diff_vs_account = 46;
  optional int64 pnl_as_of_ts_ns = 47;
  string session_phase = 48;
  string strategy_window_id = 49;
  optional int64 window_start_ts_ns = 50;
  optional int64 window_end_ts_ns = 51;
  string window_status = 52;
  optional int64 next_transition_ts_ns = 53;
  bool is_market_open = 54;
  bool is_regular_session = 55;
  bool is_opening_window = 56;
  uint64 symbols_blocked = 57;
  uint64 symbols_with_fresh_l1 = 58;
  uint64 symbols_with_fresh_l2 = 59;
  uint64 symbols_missing_md = 60;
  uint64 l1_symbols_allocated = 61;
  uint64 l2_capacity = 62;
  uint64 l2_capacity_used = 63;
  repeated string l2_denied_symbols = 64;
  string lease_authority_version = 65;
}

message StrategyRiskGate {
  string name = 1;
  bool passed = 2;
  string detail = 3;
  string scope = 4;
  string observed = 5;
  string limit = 6;
  string status = 7;
  string severity = 8;
  string reason = 9;
  string policy_version = 10;
  optional uint64 source_seq = 11;
  optional int64 evaluated_ts_ns = 12;
}

message OrderTimelineEntry {
  uint64 sequence = 1;
  int64 ts_ns = 2;
  string kind = 3;
  string summary = 4;
}

message FeeProjection {
  string name = 1;
  Money amount = 2;
}

message OrderFillProjection {
  string exec_id = 1;
  string broker_exec_id = 2;
  uint64 fill_seq = 3;
  int64 qty = 4;
  Price price = 5;
  string venue = 6;
  string liquidity_flag = 7;
  Money commission = 8;
  repeated Money fees = 9;
  string currency = 10;
  optional int64 fill_ts_ns = 11;
  optional int64 report_ts_ns = 12;
  optional int64 position_after_fill = 13;
  string order_id = 14;
  string symbol = 15;
  string side = 16;
  string exchange = 17;
  Money realized_pnl_delta = 18;
  optional int64 ingest_ts_ns = 19;
  repeated FeeProjection fee_details = 20;
}

message OrderRiskProjection {
  bool approved = 1;
  repeated string reason_codes = 2;
  string severity = 3;
  string decision_id = 4;
  string risk_snapshot_id = 5;
  string authority_policy_version = 6;
  optional uint64 risk_decision_seq = 7;
  string risk_result = 8;
  string limits_snapshot_id = 9;
}

message OrderTimeline {
  string correlation_id = 1;
  string strategy_id = 2;
  string account_id = 3;
  string symbol = 4;
  OrderSide side = 5;
  int64 intended_quantity = 6;
  OrderLifecycleState state = 7;
  string order_id = 8;
  string broker_order_id = 9;
  int64 filled_quantity = 10;
  Price average_fill_price = 11;
  repeated OrderTimelineEntry timeline = 12;
  string client_order_id = 13;
  string perm_id = 14;
  string route = 15;
  string exchange = 16;
  string destination = 17;
  optional int64 submitted_quantity = 18;
  optional int64 remaining_quantity = 19;
  Price last_fill_price = 20;
  optional int64 submit_ts_ns = 21;
  optional int64 ack_ts_ns = 22;
  optional int64 first_fill_ts_ns = 23;
  optional int64 last_fill_ts_ns = 24;
  optional int64 terminal_ts_ns = 25;
  LatencyBreakdown latency = 26;
  repeated string anomalies = 27;
  // OCaml/TWS authority mirror:
  // tws_protocol.schema owns order_ref; fsm_compiler.execution_projection_contract
  // owns cum_qty_i64 and leaves_qty_i64 naming.
  string order_ref = 28;
  string strategy_order_ref = 29;
  optional int64 cum_qty_i64 = 30;
  optional int64 leaves_qty_i64 = 31;
  optional int64 display_qty = 32;
  optional int64 min_qty = 33;
  repeated OrderFillProjection fills = 34;
  OrderRiskProjection risk = 35;
  optional int64 intent_created_ts_ns = 36;
  optional int64 risk_decision_ts_ns = 37;
  optional int64 submit_requested_ts_ns = 38;
  optional int64 order_submitted_ts_ns = 39;
  optional int64 broker_ack_ts_ns = 40;
  optional int64 cancel_requested_ts_ns = 41;
  optional int64 cancel_ack_ts_ns = 42;
  string broker_account_id = 43;
  string broker_perm_id = 44;
  optional int32 broker_client_id = 45;
  optional int64 total_qty = 46;
  string remaining_reason = 47;
  Price bbo_bid_at_signal = 48;
  Price bbo_ask_at_signal = 49;
  Price bbo_bid_at_intent = 50;
  Price bbo_ask_at_intent = 51;
  Price bbo_bid_at_submit = 52;
  Price bbo_ask_at_submit = 53;
  Price bbo_bid_at_ack = 54;
  Price bbo_ask_at_ack = 55;
  Price bbo_bid_at_fill = 56;
  Price bbo_ask_at_fill = 57;
  Price mid_at_submit = 58;
  optional double spread_bps_at_submit = 59;
  optional uint64 quote_age_ms_at_submit = 60;
  optional double queue_position_estimate = 61;
  optional double slippage_vs_mid_bps = 62;
  optional double slippage_vs_arrival_bps = 63;
  optional double slippage_vs_decision_bps = 64;
  string causal_chain_summary = 65;
}

message PositionProjection {
  string account_id = 1;
  string symbol = 2;
  int64 net_quantity = 3;
  Price average_price = 4;
  Price market_price = 5;
  double unrealized_pnl = 6;
  repeated StrategyPositionAttribution strategy_attribution = 7;
  optional int64 open_buy_qty = 8;
  optional int64 open_sell_qty = 9;
  optional int64 pending_cancel_qty = 10;
  Money reserved_buy_power = 11;
  Money position_notional = 12;
  Money gross_exposure = 13;
  Money net_exposure = 14;
  Money realized_pnl = 15;
  string mark_source = 16;
  optional int64 mark_ts_ns = 17;
  optional uint64 mark_age_ms = 18;
}

message MarketDataSummaryProjection {
  string symbol = 1;
  string source = 2;
  Price bid_price = 3;
  Price ask_price = 4;
  optional double spread_bps = 5;
  optional double imbalance = 6;
  Price microprice = 7;
  optional uint64 quote_age_ms = 8;
  optional double event_rate_per_sec = 9;
  optional int64 wall_size = 10;
  optional int64 summary_ts_ns = 11;
}

message RiskBlock {
  string scope = 1;
  string severity = 2;
  string message = 3;
  string block_id = 4;
  string rule_id = 5;
  int64 first_seen_ts_ns = 6;
  int64 last_seen_ts_ns = 7;
  optional int64 cleared_ts_ns = 8;
  string correlation_id = 9;
  string symbol = 10;
  string strategy_id = 11;
  string source = 12;
  bool blocks_order_submit = 13;
  bool blocks_cancel = 14;
  bool blocks_short = 15;
  bool blocks_command = 16;
  optional uint64 last_seen_seq = 17;
  string scope_type = 18;
  string scope_id = 19;
  string reason_code = 20;
  string reason_text = 21;
}

message RiskLimitView {
  string rule_id = 1;
  string scope = 2;
  string metric = 3;
  string observed = 4;
  string limit = 5;
  string unit = 6;
  string status = 7;
  int64 updated_ts_ns = 8;
  string severity = 9;
  string reason = 10;
  string policy_version = 11;
  optional uint64 source_seq = 12;
  optional int64 evaluated_ts_ns = 13;
}

message RiskSnapshot {
  string global_state = 1;
  bool kill_switch_active = 2;
  bool market_data_fresh = 3;
  bool broker_order_channel_ok = 4;
  bool day_max_loss_breached = 5;
  bool quote_staleness_ok = 6;
  bool short_permission = 7;
  repeated RiskBlock active_blocks = 8;
  repeated RiskLimitView structured_limits = 9;
  string risk_mode = 10;
  bool limits_enforced = 11;
}

message AlertProjection {
  string alert_id = 1;
  string severity = 2;
  string domain = 3;
  string message = 4;
  bool acknowledged = 5;
  string acknowledged_by = 6;
  string acknowledge_reason = 7;
}

message CommandEvidenceProjection {
  string command_id = 1;
  string operator_id = 2;
  string command_type = 3;
  string aggregate_id = 4;
  string audit_status = 5;
  string audit_reason = 6;
  string target = 7;
  string authority_decision_id = 8;
  string authority_status = 9;
  repeated string reason_codes = 10;
  repeated string matched_policy_ids = 11;
  string capability = 12;
  string scope = 13;
  repeated string approved_by = 14;
  optional int64 decided_ts_ns = 15;
  string authority_policy_version = 16;
  string target_environment = 17;
  string session = 18;
  optional int64 requested_at_ts_ns = 19;
  optional bool risk_checked = 20;
  optional bool dry_run = 21;
  optional bool execute_broker = 22;
  string status = 23;
  string result_event_id = 24;
  string error_code = 25;
  string error_message = 26;
  string rollback_command_id = 27;
}

message TerminalProjectionSnapshot {
  string schema_version = 1;
  int64 snapshot_ts_ns = 2;
  string source = 3;
  optional uint64 last_event_sequence = 4;
  OverviewSnapshot account = 5;
  repeated StrategySnapshot strategies = 6;
  repeated OrderTimeline orders = 7;
  repeated PositionProjection positions = 8;
  RiskSnapshot risk = 9;
  repeated AlertProjection alerts = 10;
  repeated OverviewSnapshot accounts = 11;
  repeated CommandEvidenceProjection commands = 12;
  repeated MarketDataSummaryProjection market_data = 13;
  string runtime_mode = 14;
  string projection_source = 15;
  optional uint64 projection_as_of_seq = 16;
  optional int64 projection_as_of_ts_ns = 17;
  optional uint64 last_event_age_ms = 18;
  bool nats_connected = 19;
  optional uint64 nats_consumer_lag = 20;
  optional uint64 stream_lag = 21;
  optional double event_ingest_rate = 22;
  optional double projection_update_rate = 23;
  optional double ui_render_rate = 24;
  optional uint64 snapshot_age_ms = 25;
  uint64 events_ingested_live = 26;
  uint64 events_loaded_replay = 27;
  uint64 events_loaded_snapshot = 28;
  uint64 events_coalesced_ui = 29;
  string replay_id = 30;
  string replay_source_stream = 31;
  optional uint64 replay_from_seq = 32;
  optional uint64 replay_to_seq = 33;
  optional int64 replay_from_ts_ns = 34;
  optional int64 replay_to_ts_ns = 35;
  string replay_filter = 36;
  uint64 replay_events_loaded = 37;
  uint64 replay_events_skipped = 38;
  uint64 replay_events_deduped = 39;
  uint64 replay_gaps_detected = 40;
  uint64 replay_orders_rebuilt = 41;
  uint64 replay_positions_rebuilt = 42;
  uint64 replay_accounts_rebuilt = 43;
  string projection_checksum = 44;
  string live_checksum = 45;
  string determinism_status = 46;
  uint64 divergence_count = 47;
  string replay_match_live = 48;
}

message EventFilter {
  string account_id = 1;
  string strategy_id = 2;
  string symbol = 3;
  string order_id = 4;
  string broker_order_id = 5;
  string perm_id = 6;
  string command_id = 7;
  string correlation_id = 8;
  string event_type = 9;
  string severity = 10;
  string source = 11;
  string producer = 12;
  string stream = 13;
  string subject = 14;
  uint64 min_sequence = 15;
  uint64 max_sequence = 16;
  string state = 17;
  string risk_rule_id = 18;
  string venue = 19;
  string route = 20;
  int64 from_ts_ns = 21;
  int64 to_ts_ns = 22;
}
