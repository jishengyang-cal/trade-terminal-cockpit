syntax = "proto3";

package trading.v1;

enum AccountMode {
  ACCOUNT_MODE_UNSPECIFIED = 0;
  ACCOUNT_MODE_PAPER = 1;
  ACCOUNT_MODE_LIVE = 2;
  ACCOUNT_MODE_REPLAY = 3;
}

enum StrategyState {
  STRATEGY_STATE_UNSPECIFIED = 0;
  STRATEGY_STATE_IDLE = 1;
  STRATEGY_STATE_RUNNING = 2;
  STRATEGY_STATE_PAUSED = 3;
  STRATEGY_STATE_DRAINING = 4;
  STRATEGY_STATE_KILLED = 5;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
  ORDER_SIDE_SELL_SHORT = 3;
  ORDER_SIDE_BUY_TO_COVER = 4;
}

enum OrderLifecycleState {
  ORDER_LIFECYCLE_STATE_UNSPECIFIED = 0;
  ORDER_LIFECYCLE_STATE_SIGNAL_GENERATED = 1;
  ORDER_LIFECYCLE_STATE_INTENT_CREATED = 2;
  ORDER_LIFECYCLE_STATE_RISK_PENDING = 3;
  ORDER_LIFECYCLE_STATE_RISK_REJECTED = 4;
  ORDER_LIFECYCLE_STATE_RISK_APPROVED = 5;
  ORDER_LIFECYCLE_STATE_SUBMIT_REQUESTED = 6;
  ORDER_LIFECYCLE_STATE_SUBMITTED_TO_BROKER = 7;
  ORDER_LIFECYCLE_STATE_BROKER_REJECTED = 8;
  ORDER_LIFECYCLE_STATE_CANCEL_REQUESTED = 9;
  ORDER_LIFECYCLE_STATE_CANCEL_REJECTED = 10;
  ORDER_LIFECYCLE_STATE_CANCELLED = 11;
  ORDER_LIFECYCLE_STATE_PARTIALLY_FILLED = 12;
  ORDER_LIFECYCLE_STATE_FILLED = 13;
}

enum RiskDecision {
  RISK_DECISION_UNSPECIFIED = 0;
  RISK_DECISION_APPROVED = 1;
  RISK_DECISION_REJECTED = 2;
  RISK_DECISION_WARNING = 3;
}

message StrategyPositionAttribution {
  string strategy_id = 1;
  int64 quantity = 2;
  Price avg_cost = 3;
  Money realized_pnl = 4;
  Money unrealized_pnl = 5;
  repeated Money fees = 6;
  string attribution_method = 7;
  string attribution_version = 8;
  optional int64 avg_cost_ts_ns = 9;
}

message Price {
  int64 value = 1;
  int32 scale = 2;
  string currency = 3;
}

message Money {
  int64 value = 1;
  int32 scale = 2;
  string currency = 3;
}

message LatencyBreakdown {
  optional uint64 signal_to_intent_ms = 1;
  optional uint64 intent_to_risk_ms = 2;
  optional uint64 risk_to_submit_ms = 3;
  optional uint64 submit_to_ack_ms = 4;
  optional uint64 ack_to_first_fill_ms = 5;
  optional uint64 submit_to_terminal_ms = 6;
  optional uint64 risk_to_submit_req_ms = 7;
  optional uint64 submit_req_to_submitted_ms = 8;
  optional uint64 submitted_to_ack_ms = 9;
  optional uint64 submit_to_first_fill_ms = 10;
  optional uint64 cancel_to_ack_ms = 11;
  optional uint64 partial_to_full_fill_ms = 12;
}

message RiskRuleEval {
  string rule_id = 1;
  string rule_name = 2;
  bool passed = 3;
  string observed = 4;
  string threshold = 5;
  string unit = 6;
  string severity = 7;
  string reason = 8;
  string policy_version = 9;
  optional uint64 source_seq = 10;
  optional int64 evaluated_ts_ns = 11;
}
