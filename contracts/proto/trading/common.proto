syntax = "proto3";

package trading.v1;

enum AccountMode {
  ACCOUNT_MODE_UNSPECIFIED = 0;
  ACCOUNT_MODE_PAPER = 1;
  ACCOUNT_MODE_LIVE = 2;
  ACCOUNT_MODE_REPLAY = 3;
}

enum StrategyState {
  STRATEGY_STATE_UNSPECIFIED = 0;
  STRATEGY_STATE_IDLE = 1;
  STRATEGY_STATE_RUNNING = 2;
  STRATEGY_STATE_PAUSED = 3;
  STRATEGY_STATE_DRAINING = 4;
  STRATEGY_STATE_KILLED = 5;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
  ORDER_SIDE_SELL_SHORT = 3;
  ORDER_SIDE_BUY_TO_COVER = 4;
}

enum OrderLifecycleState {
  ORDER_LIFECYCLE_STATE_UNSPECIFIED = 0;
  ORDER_LIFECYCLE_STATE_SIGNAL_GENERATED = 1;
  ORDER_LIFECYCLE_STATE_INTENT_CREATED = 2;
  ORDER_LIFECYCLE_STATE_RISK_PENDING = 3;
  ORDER_LIFECYCLE_STATE_RISK_REJECTED = 4;
  ORDER_LIFECYCLE_STATE_RISK_APPROVED = 5;
  ORDER_LIFECYCLE_STATE_SUBMIT_REQUESTED = 6;
  ORDER_LIFECYCLE_STATE_SUBMITTED_TO_BROKER = 7;
  ORDER_LIFECYCLE_STATE_BROKER_REJECTED = 8;
  ORDER_LIFECYCLE_STATE_CANCEL_REQUESTED = 9;
  ORDER_LIFECYCLE_STATE_CANCEL_REJECTED = 10;
  ORDER_LIFECYCLE_STATE_CANCELLED = 11;
  ORDER_LIFECYCLE_STATE_PARTIALLY_FILLED = 12;
  ORDER_LIFECYCLE_STATE_FILLED = 13;
}

enum RiskDecision {
  RISK_DECISION_UNSPECIFIED = 0;
  RISK_DECISION_APPROVED = 1;
  RISK_DECISION_REJECTED = 2;
  RISK_DECISION_WARNING = 3;
}

message StrategyPositionAttribution {
  string strategy_id = 1;
  int64 quantity = 2;
}
