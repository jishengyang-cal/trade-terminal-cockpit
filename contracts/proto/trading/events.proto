syntax = "proto3";

package trading.v1;

import "trading/common.proto";

message EventEnvelope {
  string event_id = 1;
  string event_type = 2;
  string aggregate_type = 3;
  string aggregate_id = 4;
  string correlation_id = 5;
  string causation_id = 6;
  int64 source_ts_ns = 7;
  int64 ingest_ts_ns = 8;
  int64 publish_ts_ns = 9;
  uint64 sequence = 10;
  string producer = 11;
  string schema_version = 12;
  bytes payload = 13;
  string stream = 14;
  string subject = 15;
  string partition_key = 16;
  string replay_id = 17;
  string environment = 18;
  optional int64 venue_ts_ns = 19;
  optional int64 receive_ts_ns = 20;
  optional int64 monotonic_ns = 21;
  string trace_id = 22;
  string span_id = 23;
  string checksum = 24;
}

message AccountSnapshot {
  string account_id = 1;
  string mode = 2;
  string broker = 3;
  optional bool broker_connected = 4;
  string account_currency = 5;
  Money cash = 6;
  Money buying_power = 7;
  Money day_pnl = 8;
  Money realized_pnl = 9;
  Money unrealized_pnl = 10;
  Money net_liquidation = 11;
  Money equity_with_loan = 12;
  Money initial_margin = 13;
  Money maintenance_margin = 14;
  Money excess_liquidity = 15;
  Money available_funds = 16;
  Money sma = 17;
  optional int32 day_trades_remaining = 18;
  string pdt_status = 19;
  string trading_restriction = 20;
  Money settled_cash = 21;
  Money unsettled_cash = 22;
  Money gross_exposure = 23;
  Money net_exposure = 24;
  Money long_market_value = 25;
  Money short_market_value = 26;
  optional double exposure_pct = 27;
  optional double margin_usage_pct = 28;
  optional bool short_permission = 29;
  optional uint64 short_intents_blocked_today = 30;
  string canonical_account_id = 31;
  optional uint32 account_slot = 32;
  string account_id_hash_hex = 33;
  string endpoint_id = 34;
  optional int32 client_id = 35;
  string gateway_tier = 36;
  string account_role = 37;
  optional uint32 role_bits = 38;
  optional bool readonly = 39;
  optional bool margin_account = 40;
  string account_type = 41;
}

message MarketDataSummary {
  string symbol = 1;
  string source = 2;
  Price bid_price = 3;
  Price ask_price = 4;
  optional double spread_bps = 5;
  optional double imbalance = 6;
  Price microprice = 7;
  optional uint64 quote_age_ms = 8;
  optional double event_rate_per_sec = 9;
  optional int64 wall_size = 10;
  optional int64 summary_ts_ns = 11;
}

message StrategyHeartbeat {
  string strategy_id = 1;
  StrategyState state = 2;
  AccountMode mode = 3;
  uint64 heartbeat_lag_ms = 4;
}

message StrategyRiskGateProjection {
  string name = 1;
  bool passed = 2;
  string detail = 3;
}

message StrategyHealthUpdated {
  string strategy_id = 1;
  optional bool enabled = 2;
  string trading_window = 3;
  string current_phase = 4;
  string universe_version = 5;
  optional uint64 universe_count = 6;
  optional uint64 active_symbol_count = 7;
  optional uint64 watched_symbol_count = 8;
  optional uint64 l2_allocated_symbol_count = 9;
  optional double signal_rate_1m = 10;
  optional double reject_rate_1m = 11;
  optional double fill_rate_1m = 12;
  optional double cancel_rate_1m = 13;
  optional uint64 avg_intent_to_submit_ms = 14;
  optional uint64 avg_submit_to_ack_ms = 15;
  optional uint64 avg_ack_to_fill_ms = 16;
  optional uint64 consecutive_stops = 17;
  optional uint64 trades_today = 18;
  optional uint64 max_trades_today = 19;
  optional double daily_loss_used_pct = 20;
  map<string, string> parameters = 21;
  repeated StrategyRiskGateProjection risk_gates = 22;
}

message StrategyStateChanged {
  string strategy_id = 1;
  StrategyState state = 2;
  AccountMode mode = 3;
  string reason = 4;
}

message SignalGenerated {
  string correlation_id = 1;
  string strategy_id = 2;
  string symbol = 3;
  string signal_name = 4;
  optional double score = 5;
  string reason = 6;
  string account_id = 7;
  string side_hint = 8;
  optional uint64 horizon_ms = 9;
  optional double expected_edge_bps = 10;
  optional double confidence = 11;
  string feature_version = 12;
  string model_version = 13;
  string market_snapshot_id = 14;
  Price reference_price = 15;
  Price bid_price = 16;
  Price ask_price = 17;
  optional double spread_bps = 18;
  optional double imbalance = 19;
  Price microprice = 20;
  optional double volatility_bps = 21;
  optional double liquidity_score = 22;
}

message IntentCreated {
  string correlation_id = 1;
  string strategy_id = 2;
  string symbol = 3;
  OrderSide side = 4;
  int64 quantity = 5;
  string reason = 6;
  string account_id = 7;
  string intent_id = 8;
  string parent_intent_id = 9;
  string instrument_id = 10;
  string asset_class = 11;
  string currency = 12;
  string quantity_type = 13;
  Money notional = 14;
  Price limit_price_hint = 15;
  Price stop_price_hint = 16;
  string time_in_force_hint = 17;
  string urgency = 18;
  string position_effect = 19;
  optional double max_slippage_bps = 20;
  optional int64 expires_at_ns = 21;
}

message RiskDecisionMade {
  string correlation_id = 1;
  string strategy_id = 2;
  string symbol = 3;
  RiskDecision decision = 4;
  repeated string reason_codes = 5;
  string decision_id = 6;
  string intent_id = 7;
  string severity = 8;
  repeated RiskRuleEval evaluated_rules = 9;
  string risk_snapshot_id = 10;
  Money account_day_pnl = 11;
  Money strategy_day_pnl = 12;
  Money symbol_exposure = 13;
  Money account_exposure = 14;
  optional int64 remaining_trade_budget = 15;
  Money remaining_loss_budget = 16;
  optional uint64 market_data_age_ms = 17;
  optional uint64 quote_staleness_ms = 18;
  optional bool short_permission = 19;
  string authority_policy_version = 20;
}

message OrderSubmitRequested {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string order_type = 4;
  Price limit_price_value = 5;
  string tif = 6;
  string client_order_id = 7;
  string broker_order_id = 8;
  string perm_id = 9;
  string parent_order_id = 10;
  string oca_group = 11;
  string route = 12;
  string destination = 13;
  string exchange = 14;
  string order_ref = 15;
  OrderSide side = 16;
  optional int64 quantity = 17;
  optional int64 remaining_quantity = 18;
  Price stop_price = 19;
  Price aux_price = 20;
  bool outside_rth = 21;
  bool extended_hours = 22;
  bool allow_preopen = 23;
  bool allow_after_hours = 24;
  optional int64 min_qty = 25;
  optional int64 display_size = 26;
  Price discretionary_amount = 27;
  bool transmit = 28;
}

message OrderSubmitted {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string broker = 4;
  string client_order_id = 5;
  string broker_order_id = 6;
  string perm_id = 7;
  string route = 8;
  string exchange = 9;
  string destination = 10;
}

message BrokerAckReceived {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string broker_order_id = 4;
  string broker_status = 5;
  string perm_id = 6;
  optional int64 remaining_quantity = 7;
  optional int64 receive_ts_ns = 8;
}

message OrderFill {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  int64 filled_quantity = 4;
  Price fill_price = 5;
  string execution_id = 6;
  string broker_execution_id = 7;
  optional int64 last_quantity = 8;
  optional int64 cumulative_quantity = 9;
  optional int64 remaining_quantity = 10;
  Price last_price = 11;
  Price average_price = 12;
  string venue = 13;
  string liquidity = 14;
  Money commission = 15;
  repeated Fee fees = 16;
  optional int64 trade_ts_ns = 17;
  optional int64 report_ts_ns = 18;
  string settlement_currency = 19;
}

message Fee {
  string name = 1;
  Money amount = 2;
}

message CancelRequested {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string reason = 4;
}

message CancelRejected {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string reason = 4;
}

message OrderCancelled {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
}

message OrderRejected {
  string correlation_id = 1;
  string account_id = 2;
  string order_id = 3;
  string reason = 4;
}

message PositionSnapshot {
  string account_id = 1;
  string symbol = 2;
  int64 net_quantity = 3;
  Price average_price = 4;
  Price market_price = 5;
  repeated StrategyPositionAttribution strategy_attribution = 6;
}

message RiskLimitBreached {
  string scope = 1;
  string severity = 2;
  string message = 3;
  string block_id = 4;
  string rule_id = 5;
  optional int64 first_seen_ts_ns = 6;
  optional int64 last_seen_ts_ns = 7;
  optional int64 cleared_ts_ns = 8;
  string correlation_id = 9;
  string symbol = 10;
  string strategy_id = 11;
}

message AlertRaised {
  string alert_id = 1;
  string severity = 2;
  string domain = 3;
  string message = 4;
}

message AlertAcknowledged {
  string alert_id = 1;
  string operator_id = 2;
  string reason = 3;
}

message IngestDiagnosticRecorded {
  string source = 1;
  string stream = 2;
  string consumer = 3;
  string subject = 4;
  string severity = 5;
  string message = 6;
  string error_kind = 7;
  bool reconnect = 8;
  bool decode_error = 9;
  uint64 filtered_count = 10;
  uint64 acked_count = 11;
}

message CommandAuthorityDecided {
  string decision_id = 1;
  string command_id = 2;
  string status = 3;
  repeated string reason_codes = 4;
  repeated string matched_policy_ids = 5;
  string operator_id = 6;
  string command_type = 7;
  string capability = 8;
  string scope = 9;
  repeated string approved_by = 10;
  int64 decided_ts_ns = 11;
  string authority_policy_version = 12;
  string target_environment = 13;
}

message CommandAuditRecorded {
  string command_id = 1;
  string operator_id = 2;
  string command_type = 3;
  string status = 4;
  string reason = 5;
  string target = 6;
}
