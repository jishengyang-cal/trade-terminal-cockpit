name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Rust and cockpit boundary checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust tests
        run: cargo test --workspace

      - name: Boundary check
        run: tools/check_repo_boundary.sh

      - name: Smoke check
        run: tools/smoke_check.sh
